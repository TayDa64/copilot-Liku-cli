name: Release

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      ref:
        description: 'Tag or ref to release (leave empty to use the triggering ref)'
        required: false

permissions: {}

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest
    environment: npm-release
    
    permissions:
      contents: read
      attestations: write
      id-token: write
    
    steps:
      - name: Checkout code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          ref: ${{ inputs.ref || github.ref }}
      
      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: '22.14.0'
          cache: npm
          registry-url: 'https://registry.npmjs.org'
      
      - name: Install dependencies
        run: npm ci

      - name: Verify workflow policy
        run: npm run verify:workflow-policy
      
      - name: Run CLI seam validation
        run: npm run test:cli-phase01

      - name: Run persistence regression suite
        run: npm run test:persistence-controls

      - name: Run GitHub bundle regression suite
        run: npm run test:github-phase5-bundles
      
      - name: Verify package contents
        run: npm run verify:package

      - name: Build release tarball
        id: pack
        shell: bash
        run: |
          npm pack --json > pack-output.json
          PACKAGE_FILENAME=$(node -e "const manifest = require('./pack-output.json'); process.stdout.write(manifest[0].filename);")
          echo "filename=${PACKAGE_FILENAME}" >> "$GITHUB_OUTPUT"

      - name: Generate release SBOM
        run: npm sbom --omit=dev --sbom-format spdx --sbom-type application > sbom.spdx.json

      - name: Upload release artifacts
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: release-artifacts
          path: |
            pack-output.json
            ${{ steps.pack.outputs.filename }}
            sbom.spdx.json

      - name: Attest npm tarball provenance
        uses: actions/attest-build-provenance@a2bbfa25375fe432b6a289bc6b6cd05ecd0c4c32
        with:
          subject-path: ${{ steps.pack.outputs.filename }}

      - name: Attest npm tarball SBOM
        uses: actions/attest-sbom@c604332985a26aa8cf1bdc465b92731239ec6b9e
        with:
          subject-path: ${{ steps.pack.outputs.filename }}
          sbom-path: sbom.spdx.json
      
      - name: Check if version already published
        id: check-version
        run: |
          PACKAGE_NAME=$(node -p "require('./package.json').name")
          PACKAGE_VERSION=$(node -p "require('./package.json').version")
          
          if npm view "$PACKAGE_NAME@$PACKAGE_VERSION" version 2>/dev/null; then
            echo "⚠️ Version $PACKAGE_VERSION is already published"
            echo "already_published=true" >> $GITHUB_OUTPUT
          else
            echo "✅ Version $PACKAGE_VERSION is not published yet"
            echo "already_published=false" >> $GITHUB_OUTPUT
          fi
      
      - name: Publish to npm
        if: steps.check-version.outputs.already_published != 'true'
        run: npm publish "${{ steps.pack.outputs.filename }}" --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
      
      - name: Write publish summary
        if: steps.check-version.outputs.already_published != 'true' && github.event_name == 'release'
        run: |
          PACKAGE_NAME=$(node -p "require('./package.json').name")
          PACKAGE_VERSION=$(node -p "require('./package.json').version")
          {
            echo "## npm publish"
            echo ""
            echo "Published \\`${PACKAGE_NAME}@${PACKAGE_VERSION}\\` to npm."
            echo ""
            echo "Release artifacts uploaded: tarball manifest, tarball, and SPDX SBOM."
            echo ""
            echo "Tarball provenance and SBOM attestations were emitted before publish."
            echo ""
            echo "Install with:"
            echo "\\`\\`\\`bash"
            echo "npm install -g ${PACKAGE_NAME}"
            echo "\\`\\`\\`"
          } >> "$GITHUB_STEP_SUMMARY"
      
      - name: Version already published
        if: steps.check-version.outputs.already_published == 'true'
        run: |
          echo "ℹ️ Skipping publish - version already exists on npm"
          exit 0
