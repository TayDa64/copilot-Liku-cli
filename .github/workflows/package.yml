name: Package Verification

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: package-${{ github.ref }}
  cancel-in-progress: true

jobs:
  package:
    runs-on: ubuntu-latest

    permissions:
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: '22'
          cache: npm
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        run: npm ci

      - name: Verify npm package dry-run contents
        run: npm run verify:package

      - name: Capture npm pack manifest
        run: npm pack --dry-run --json > pack-dry-run.json

      - name: Generate package SBOM
        run: npm sbom --omit=dev --sbom-format spdx --sbom-type application > sbom.spdx.json

      - name: Upload npm pack manifest
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: npm-package-verification
          path: |
            pack-dry-run.json
            sbom.spdx.json
